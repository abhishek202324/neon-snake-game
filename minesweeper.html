<!DOCTYPE html>
<html>
<head>
    <title>Neon Minesweeper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0c10; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; margin:0;}
        h1 { color: #ff5500; text-shadow: 0 0 10px #ff5500; margin-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(10, 35px); gap: 2px; justify-content: center; margin: 20px auto; max-width: 95vw;}
        .cell { width: 35px; height: 35px; background: rgba(255,255,255,0.1); border: 1px solid #555; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: sans-serif; user-select: none; transition: background 0.2s;}
        .cell:hover { background: rgba(255,255,255,0.2); }
        .cell.revealed { background: rgba(0,0,0,0.5); border-color: #333; cursor: default; color: #00f3ff; text-shadow: 0 0 5px #00f3ff; }
        .cell.mine { background: #ff3131 !important; box-shadow: 0 0 15px #ff3131; }
        .cell.flag { background: rgba(255,85,0,0.4); text-shadow: 0 0 5px #ff5500; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ BACK</a>
    <h1>MINESWEEPER</h1>
    <div id="status">💣 10 Mines. Right click to flag.<br><br></div>
    <div class="grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        const rows = 10, cols = 10, mineCount = 10;
        let board=[], minelocs=[], revealedCount=0, active=true;
        
        for(let r=0; r<rows; r++) {
            let row = [];
            for(let c=0; c<cols; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.oncontextmenu = (e) => { e.preventDefault(); flag(r,c); };
                cell.onclick = () => reveal(r,c);
                grid.appendChild(cell);
                row.push({el: cell, mine:false, r:false, f:false, n:0});
            }
            board.push(row);
        }
        
        // Mobile long press for flag
        board.forEach((row, r) => {
            row.forEach((cell, c) => {
                let pressTimer;
                cell.el.addEventListener('touchstart', (e) => {
                    pressTimer = window.setTimeout(() => { flag(r,c); e.preventDefault(); }, 500);
                });
                cell.el.addEventListener('touchend', () => { clearTimeout(pressTimer); });
                cell.el.addEventListener('touchmove', () => { clearTimeout(pressTimer); });
            });
        });

        let placed=0;
        while(placed < mineCount) {
            let r=Math.floor(Math.random()*rows), c=Math.floor(Math.random()*cols);
            if(!board[r][c].mine) { board[r][c].mine = true; minelocs.push([r,c]); placed++; }
        }
        
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                if(board[r][c].mine) continue;
                let count=0;
                for(let i=-1; i<=1; i++) {
                    for(let j=-1; j<=1; j++) {
                        if(r+i>=0 && r+i<rows && c+j>=0 && c+j<cols && board[r+i][c+j].mine) count++;
                    }
                }
                board[r][c].n = count;
            }
        }
        
        function reveal(r,c) {
            if(!active || board[r][c].r || board[r][c].f) return;
            let cell = board[r][c];
            cell.r = true;
            cell.el.classList.add('revealed');
            
            if(cell.mine) {
                cell.el.classList.add('mine');
                cell.el.innerText = '💣';
                active=false; document.getElementById("status").innerHTML="<span style='color:#ff3131;text-shadow:0 0 10px #ff3131'>GAME OVER!</span><br><a href='minesweeper.html' style='color:#fff'>Restart</a>";
                minelocs.forEach(m => { board[m[0]][m[1]].el.classList.add('mine'); board[m[0]][m[1]].el.innerText='💣'; });
                return;
            }
            if(cell.n > 0) cell.el.innerText = cell.n;
            else {
                for(let i=-1; i<=1; i++) {
                    for(let j=-1; j<=1; j++) {
                        if(r+i>=0 && r+i<rows && c+j>=0 && c+j<cols) reveal(r+i,c+j);
                    }
                }
            }
            revealedCount++;
            if(revealedCount === rows*cols - mineCount) {
                active=false; document.getElementById("status").innerHTML="<span style='color:#39ff14;text-shadow:0 0 10px #39ff14'>YOU WIN!</span><br><a href='minesweeper.html' style='color:#fff'>Restart</a>";
            }
        }
        function flag(r,c) {
            if(!active || board[r][c].r) return;
            board[r][c].f = !board[r][c].f;
            if(board[r][c].f) { board[r][c].el.classList.add('flag'); board[r][c].el.innerText='🚩'; }
            else { board[r][c].el.classList.remove('flag'); board[r][c].el.innerText=''; }
        }
    </script>
</body>
</html>
