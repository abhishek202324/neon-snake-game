<!DOCTYPE html>
<html>
<head>
    <title>Neon Memory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0c10; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; }
        h1 { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-top: 50px; }
        .grid { display: grid; grid-template-columns: repeat(4, 70px); gap: 10px; justify-content: center; margin: 20px auto; }
        .card { width: 70px; height: 70px; background: #222; border: 2px solid #00f3ff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; border-radius: 5px; transition: 0.3s; }
        .card.flipped { background: rgba(0, 243, 255, 0.2); box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); cursor: default; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ BACK</a>
    <h1>MEMORY MATCH</h1>
    <p id="msg">Matches: 0 / 8</p>
    <div class="grid" id="grid"></div>
    <script>
        const symbols = ['👽','🤖','👻','👾','💀','🤡','👹','👺'];
        let cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
        let first = null, second = null, lock = false, matches = 0;
        const grid = document.getElementById('grid');
        
        cards.forEach((sym) => {
            let c = document.createElement('div');
            c.className = 'card';
            c.dataset.sym = sym;
            c.onclick = () => flip(c);
            grid.appendChild(c);
        });

        function flip(c) {
            if(lock || c === first || c.classList.contains('flipped')) return;
            c.textContent = c.dataset.sym;
            c.classList.add('flipped');
            if(!first) first = c;
            else {
                second = c; lock = true;
                if(first.dataset.sym === second.dataset.sym) {
                    matches++; document.getElementById('msg').innerText = `Matches: ${matches} / 8`;
                    first = null; second = null; lock = false;
                    if(matches===8) setTimeout(()=>alert('YOU WIN!'), 300);
                } else {
                    setTimeout(() => {
                        first.textContent=''; first.classList.remove('flipped');
                        second.textContent=''; second.classList.remove('flipped');
                        first = null; second = null; lock = false;
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
