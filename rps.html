<!DOCTYPE html>
<html>
<head>
    <title>Neon Rock Paper Scissors</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0c10; color: #fff; font-family: 'Orbitron', sans-serif; text-align: center; padding: 20px; }
        h1 { color: #ff3131; text-shadow: 0 0 10px #ff3131; margin-top: 50px;}
        .tools { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .tool { font-size: 50px; padding: 20px; cursor: pointer; background: rgba(255,255,255,0.05); border: 2px solid #555; border-radius: 10px; transition: 0.3s; }
        .tool:hover { border-color: #ff3131; box-shadow: 0 0 20px rgba(255,49,49,0.5); transform: scale(1.1); }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; }
        #result { font-size: 30px; margin: 20px; min-height: 80px; color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
        #score { font-size: 20px; color: #aaa; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ BACK</a>
    <h1>ROCK PAPER SCISSORS</h1>
    <div class="tools">
        <div class="tool" onclick="play('rock')">✊</div>
        <div class="tool" onclick="play('paper')">✋</div>
        <div class="tool" onclick="play('scissors')">✌️</div>
    </div>
    <div id="result">Choose your weapon!</div>
    <div id="score">Wins: 0 | Losses: 0</div>
    <script>
        const tools = ['rock', 'paper', 'scissors'];
        const emojis = { rock: '✊', paper: '✋', scissors: '✌️' };
        let w = 0, l = 0;
        function play(choice) {
            let comp = tools[Math.floor(Math.random()*3)];
            let res = '';
            if(choice === comp) res = 'DRAW!';
            else if((choice=='rock'&&comp=='scissors')||(choice=='paper'&&comp=='rock')||(choice=='scissors'&&comp=='paper')) {
                res = 'YOU WIN!'; w++;
            } else { res = 'YOU LOSE!'; l++; }
            document.getElementById('result').innerHTML = `You: ${emojis[choice]} VS Comp: ${emojis[comp]}<br><br>${res}`;
            document.getElementById('score').innerText = `Wins: ${w} | Losses: ${l}`;
        }
    </script>
</body>
</html>
