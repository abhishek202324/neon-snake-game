<!DOCTYPE html>
<html>
<head>
    <title>Neon Tetris</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0c10; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden;}
        h1 { color: #ff8800; text-shadow: 0 0 10px #ff8800; margin-top: 50px; margin-bottom: 20px;}
        .back-btn { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; border: 1px solid #555; padding: 10px 20px; border-radius: 5px; z-index: 10;}
        canvas { border: 2px solid #ff8800; box-shadow: 0 0 20px rgba(255, 136, 0, 0.4); border-radius: 5px; background: rgba(0,0,0,0.5); }
        .controls { display: flex; gap:10px; margin-top: 20px;}
        button { background: rgba(255,255,255,0.1); color: #fff; border: 2px solid #ff8800; padding: 15px 25px; border-radius: 5px; font-size: 20px; cursor: pointer; }
        button:active { background: #ff8800; color: #000; }
        #score { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">⬅ BACK</a>
    <h1>NEON TETRIS</h1>
    <div id="score">SCORE: 0</div>
    <canvas id="game" width="240" height="400"></canvas>
    <div class="controls">
        <button onclick="move(-1,0)">⬅️</button>
        <button onclick="move(1,0)">➡️</button>
        <button onclick="rotate()">🔄</button>
        <button onclick="move(0,1)">⬇️</button>
    </div>
    <script>
        const cvs = document.getElementById("game");
        const ctx = cvs.getContext("2d");
        const ROW=20, COL=12, SQ=20;
        let score=0;
        function drawSquare(x,y,c) { ctx.fillStyle=c; ctx.shadowBlur=10; ctx.shadowColor=c; ctx.fillRect(x*SQ,y*SQ,SQ,SQ); ctx.strokeStyle="#111"; ctx.shadowBlur=0; ctx.strokeRect(x*SQ,y*SQ,SQ,SQ); }
        
        let board = Array.from({length: ROW}, () => Array(COL).fill(""));
        const PIECES = [
            [[[1,1,1,1]], "#00f3ff"],
            [[[1,0,0],[1,1,1]], "#ff00ff"],
            [[[0,0,1],[1,1,1]], "#ff8800"],
            [[[1,1],[1,1]], "#ffff00"],
            [[[0,1,1],[1,1,0]], "#39ff14"],
            [[[0,1,0],[1,1,1]], "#ff0088"],
            [[[1,1,0],[0,1,1]], "#ff3131"]
        ];

        let p = randomPiece();
        let dropStart = Date.now();
        let gameOver = false;

        function randomPiece() {
            let idx = Math.floor(Math.random() * PIECES.length);
            return { shape: PIECES[idx][0], color: PIECES[idx][1], x: 4, y: -2 };
        }

        function drawBoard() {
            for(let r=0; r<ROW; r++) {
                for(let c=0; c<COL; c++) {
                    if(board[r][c] !== "") drawSquare(c,r,board[r][c]);
                }
            }
        }

        function collision(x,y,shape) {
            for(let r=0; r<shape.length; r++) {
                for(let c=0; c<shape[r].length; c++) {
                    if(!shape[r][c]) continue;
                    let newX = x+c, newY = y+r;
                    if(newX<0 || newX>=COL || newY>=ROW) return true;
                    if(newY<0) continue;
                    if(board[newY][newX] !== "") return true;
                }
            }
            return false;
        }

        function rotate() {
            if(gameOver) return;
            let nextPattern = p.shape[0].map((val, index) => p.shape.map(row => row[index]).reverse());
            if(!collision(p.x, p.y, nextPattern)) { p.shape = nextPattern; draw(); }
        }

        function move(dr, dc) {
            if(gameOver) return;
            if(!collision(p.x+dr, p.y+dc, p.shape)) { p.x+=dr; p.y+=dc; draw(); }
            else if(dc===1) lock();
        }

        function lock() {
            for(let r=0; r<p.shape.length; r++) {
                for(let c=0; c<p.shape[r].length; c++) {
                    if(!p.shape[r][c]) continue;
                    if(p.y+r < 0) { alert("Game Over"); gameOver=true; return; }
                    board[p.y+r][p.x+c] = p.color;
                }
            }
            for(let r=0; r<ROW; r++) {
                let isFull=true;
                for(let c=0; c<COL; c++) isFull = isFull && (board[r][c] !== "");
                if(isFull) {
                    for(let y=r; y>1; y--) {
                        for(let c=0; c<COL; c++) board[y][c] = board[y-1][c];
                    }
                    for(let c=0; c<COL; c++) board[0][c] = "";
                    score += 10; document.getElementById("score").innerText = "SCORE: " + score;
                }
            }
            p = randomPiece();
        }

        function draw() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            drawBoard();
            for(let r=0; r<p.shape.length; r++) {
                for(let c=0; c<p.shape[r].length; c++) {
                    if(p.shape[r][c]) drawSquare(p.x+c, p.y+r, p.color);
                }
            }
        }

        function drop() {
            if(gameOver) return;
            let now = Date.now();
            let delta = now - dropStart;
            if(delta > 800) { move(0,1); dropStart = Date.now(); }
            requestAnimationFrame(drop);
        }

        document.addEventListener("keydown", e => {
            if(e.code==="ArrowLeft") move(-1,0);
            if(e.code==="ArrowRight") move(1,0);
            if(e.code==="ArrowUp") rotate();
            if(e.code==="ArrowDown") move(0,1);
        });

        draw(); drop();
    </script>
</body>
</html>
